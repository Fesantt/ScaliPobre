<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ScaliPobre</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    body.dark {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.3s;
    }

    body.dark .header {
      background: #2a2a3e;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .header h1 {
      color: #ff6b35;
      font-size: 28px;
      margin: 0;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle, .logout-btn, .back-btn {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    body.dark .theme-toggle, body.dark .logout-btn, body.dark .back-btn {
      background: #1a1a2e;
      border-color: #444;
      color: #e0e0e0;
    }

    .theme-toggle:hover, .logout-btn:hover, .back-btn:hover {
      background: #f5f5f5;
      transform: translateY(-2px);
    }

    body.dark .theme-toggle:hover, body.dark .logout-btn:hover, body.dark .back-btn:hover {
      background: #333;
    }

    .tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .tab {
      background: white;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 12px 24px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: all 0.2s;
    }

    body.dark .tab {
      background: #2a2a3e;
      color: #e0e0e0;
    }

    .tab:hover {
      background: #f5f5f5;
    }

    body.dark .tab:hover {
      background: #333;
    }

    .tab.active {
      background: #ff6b35;
      color: white;
      border-color: #ff6b35;
    }

    .content {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transition: background 0.3s;
    }

    body.dark .content {
      background: #2a2a3e;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    body.dark .stat-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    }

    .stat-card h3 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .stat-card p {
      font-size: 14px;
      opacity: 0.9;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
    }

    body.dark th, body.dark td {
      border-bottom-color: #444;
    }

    th {
      background: #f5f5f5;
      font-weight: 600;
    }

    body.dark th {
      background: #1a1a2e;
    }

    .status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .status.active {
      background: #4caf50;
      color: white;
    }

    .status.inactive {
      background: #f44336;
      color: white;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn-toggle {
      background: #ff9800;
      color: white;
    }

    .btn-delete {
      background: #f44336;
      color: white;
    }

    .btn:hover {
      opacity: 0.8;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 16px;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚙️ Painel Administrativo</h1>
      <div class="user-info">
        <span id="username">Admin</span>
        <button class="back-btn" onclick="window.location.href='/boards'">← Voltar</button>
        <button class="theme-toggle" onclick="toggleDarkMode()" title="Alternar tema">🌙</button>
        <button class="logout-btn" onclick="logout()">Sair</button>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('users')">Usuários</div>
      <div class="tab" onclick="switchTab('boards')">Boards</div>
    </div>

    <div id="users-content" class="content">
      <div class="stats">
        <div class="stat-card">
          <h3 id="total-users">0</h3>
          <p>Total de Usuários</p>
        </div>
        <div class="stat-card">
          <h3 id="active-users">0</h3>
          <p>Usuários Ativos</p>
        </div>
        <div class="stat-card">
          <h3 id="inactive-users">0</h3>
          <p>Usuários Inativos</p>
        </div>
      </div>

      <table id="users-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Status</th>
            <th>Criado em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
        </tbody>
      </table>
    </div>

    <div id="boards-content" class="content" style="display: none;">
      <div class="stats">
        <div class="stat-card">
          <h3 id="total-boards">0</h3>
          <p>Total de Boards</p>
        </div>
      </div>

      <table id="boards-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Dono</th>
            <th>Criado em</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="boards-tbody">
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let currentUser = null;
    let allUsers = [];
    let allBoards = [];

    async function checkAuth() {
      try {
        const res = await fetch('/api/me');
        if (!res.ok) {
          window.location.href = '/login';
          return;
        }
        const data = await res.json();
        currentUser = data.user;
        
        if (!currentUser.isSuperAdmin) {
          alert('Acesso negado. Apenas super administrador.');
          window.location.href = '/boards';
          return;
        }
        
        document.getElementById('username').textContent = currentUser.username;
        loadUsers();
        loadBoards();
      } catch (err) {
        console.error(err);
        window.location.href = '/login';
      }
    }

    async function loadUsers() {
      try {
        const res = await fetch('/api/admin/users');
        if (!res.ok) throw new Error('Erro ao carregar usuários');
        
        const data = await res.json();
        allUsers = data.users;
        
        document.getElementById('total-users').textContent = allUsers.length;
        document.getElementById('active-users').textContent = allUsers.filter(u => u.active).length;
        document.getElementById('inactive-users').textContent = allUsers.filter(u => !u.active).length;
        
        renderUsers();
      } catch (err) {
        console.error(err);
        alert('Erro ao carregar usuários');
      }
    }

    function renderUsers() {
      const tbody = document.getElementById('users-tbody');
      
      if (allUsers.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nenhum usuário encontrado</td></tr>';
        return;
      }
      
      tbody.innerHTML = allUsers.map(user => `
        <tr>
          <td>${user.id}</td>
          <td>${user.username}</td>
          <td>${user.email}</td>
          <td><span class="status ${user.active ? 'active' : 'inactive'}">${user.active ? 'Ativo' : 'Inativo'}</span></td>
          <td>${new Date(user.created_at).toLocaleDateString('pt-BR')}</td>
          <td>
            <div class="actions">
              <button class="btn btn-toggle" onclick="toggleUser(${user.id}, ${!user.active})" ${user.id === 1 ? 'disabled' : ''}>
                ${user.active ? 'Inativar' : 'Ativar'}
              </button>
              <button class="btn btn-delete" onclick="deleteUser(${user.id})" ${user.id === 1 ? 'disabled' : ''}>
                Excluir
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function toggleUser(userId, active) {
      if (!confirm(`Tem certeza que deseja ${active ? 'ativar' : 'inativar'} este usuário?`)) return;
      
      try {
        const res = await fetch(`/api/admin/users/${userId}/toggle`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ active })
        });
        
        if (!res.ok) throw new Error('Erro ao alterar status');
        
        await loadUsers();
      } catch (err) {
        console.error(err);
        alert('Erro ao alterar status do usuário');
      }
    }

    async function deleteUser(userId) {
      if (!confirm('Tem certeza que deseja EXCLUIR este usuário? Todos os seus boards serão removidos. Esta ação é irreversível!')) return;
      
      try {
        const res = await fetch(`/api/admin/users/${userId}`, {
          method: 'DELETE'
        });
        
        if (!res.ok) throw new Error('Erro ao excluir usuário');
        
        await loadUsers();
        await loadBoards();
      } catch (err) {
        console.error(err);
        alert('Erro ao excluir usuário');
      }
    }

    async function loadBoards() {
      try {
        const res = await fetch('/api/admin/boards');
        if (!res.ok) throw new Error('Erro ao carregar boards');
        
        const data = await res.json();
        allBoards = data.boards;
        
        document.getElementById('total-boards').textContent = allBoards.length;
        
        renderBoards();
      } catch (err) {
        console.error(err);
        alert('Erro ao carregar boards');
      }
    }

    function renderBoards() {
      const tbody = document.getElementById('boards-tbody');
      
      if (allBoards.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Nenhum board encontrado</td></tr>';
        return;
      }
      
      tbody.innerHTML = allBoards.map(board => `
        <tr>
          <td>${board.id.substring(0, 8)}...</td>
          <td>${board.name}</td>
          <td>${board.owner_username} (ID: ${board.owner_id})</td>
          <td>${new Date(board.created_at).toLocaleDateString('pt-BR')}</td>
          <td>
            <div class="actions">
              <button class="btn btn-delete" onclick="deleteBoard('${board.id}')">
                Excluir
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    async function deleteBoard(boardId) {
      if (!confirm('Tem certeza que deseja excluir este board? Esta ação é irreversível!')) return;
      
      try {
        const res = await fetch(`/api/admin/boards/${boardId}`, {
          method: 'DELETE'
        });
        
        if (!res.ok) throw new Error('Erro ao excluir board');
        
        await loadBoards();
      } catch (err) {
        console.error(err);
        alert('Erro ao excluir board');
      }
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.tab:nth-child(${tab === 'users' ? 1 : 2})`).classList.add('active');
      
      document.getElementById('users-content').style.display = tab === 'users' ? 'block' : 'none';
      document.getElementById('boards-content').style.display = tab === 'boards' ? 'block' : 'none';
    }

    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      localStorage.setItem('darkMode', document.body.classList.contains('dark'));
      const icon = document.querySelector('.theme-toggle');
      icon.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login';
    }

    if (localStorage.getItem('darkMode') === 'true') {
      document.body.classList.add('dark');
      document.querySelector('.theme-toggle').textContent = '☀️';
    }

    checkAuth();
  </script>
</body>
</html>
